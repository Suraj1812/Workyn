services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: workyn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    depends_on:
      - postgres
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/workyn
      JWT_SECRET: replace-with-a-real-secret
      CLIENT_URL: http://localhost:8080
      COOKIE_NAME: workyn_token
      AI_ANALYSIS_INTERVAL_MS: 900000
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  postgres_data:
